<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="沈光 DT-hourglass">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="沈光">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>沈光 DT-hourglass</title>
  <link rel="manifest" href="manifest.json">

  <!-- ── Pre-load glass hourglass background before Flutter starts ── -->
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background-color: #080812;
      background-image: url('https://xtsai2000-png.github.io/DT-hourglass/assets/hourglass_glass_final.png');
      background-size: 70% auto;
      background-position: center;
      background-repeat: no-repeat;
    }
    /* Make Flutter canvas transparent so DOM background shows through */
    flutter-view {
      opacity: 1;
    }
    /* Fallback: dark gradient if image is loading */
    @media not all {
      html, body { background-image: none; background-color: #080812; }
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
