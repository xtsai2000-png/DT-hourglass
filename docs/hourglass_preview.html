<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沈光 DT-hourglass</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  background-color: #080812;
  background-image: url('https://xtsai2000-png.github.io/DT-hourglass/assets/hourglass_glass_final.png');
  background-size: 70% auto;
  background-position: center;
  background-repeat: no-repeat;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  position: relative;
}

body::before {
  content: '';
  position: fixed; top: -30%; left: 0; right: 0; height: 80%;
  background: radial-gradient(ellipse 80% 100% at 50% 0%,
    rgba(255,220,100,0.10) 0%,
    rgba(255,160,40,0.04) 40%,
    transparent 70%);
  pointer-events: none; z-index: 1;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 100% 100% at 50% 50%,
    transparent 40%,
    rgba(4,4,10,0.7) 100%);
  pointer-events: none; z-index: 1;
}

#particles {
  position: fixed; inset: 0;
  z-index: 2;
  pointer-events: none;
}

#ui {
  position: fixed; inset: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  padding: 20px;
  color: white;
}

#header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding-top: 8px;
}

#brand {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.9);
  text-shadow: 0 2px 20px rgba(0,0,0,0.8);
}
#brand span {
  display: block;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.5);
  margin-top: 2px;
}

#mood-badge {
  font-size: 11px;
  padding: 6px 14px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  color: rgba(255,255,255,0.8);
  letter-spacing: 0.05em;
  transition: all 0.6s ease;
}

#center-hint {
  position: fixed;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.1em;
  text-align: center;
  pointer-events: none;
  z-index: 10;
}

#bottom {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  padding: 0 20px;
}

.card {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(16px);
  border-radius: 16px;
  padding: 12px 18px;
  min-width: 80px;
  text-align: center;
}
.card-icon { font-size: 18px; margin-bottom: 4px; }
.card-label {
  font-size: 9px;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  margin-bottom: 3px;
}
.card-value {
  font-size: 16px;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  letter-spacing: 0.02em;
}
.card-value.live {
  color: #4FC3F7;
}
.card-value.live::before {
  content: '';
  display: inline-block;
  width: 6px; height: 6px;
  background: #4FC3F7;
  border-radius: 50%;
  margin-right: 5px;
  animation: pulse 2s infinite;
  vertical-align: middle;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

#mood-selector {
  position: fixed;
  bottom: 160px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex;
  gap: 8px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  border-radius: 30px;
  padding: 8px 14px;
}

.mood-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.6);
  background: transparent;
  transition: all 0.3s ease;
  display: flex; align-items: center; justify-content: center;
}
.mood-btn:hover { color: white; background: rgba(255,255,255,0.1); }
.mood-btn.active {
  border-color: rgba(255,255,255,0.6);
  color: white;
  background: rgba(255,255,255,0.15);
  transform: scale(1.15);
}
.mood-btn[data-mood="serene"]    { background: rgba(100,181,246,0.2); }
.mood-btn[data-mood="anxious"]   { background: rgba(120,144,156,0.2); }
.mood-btn[data-mood="focused"]   { background: rgba(126,87,194,0.2); }
.mood-btn[data-mood="energetic"] { background: rgba(255,183,77,0.2); }
.mood-btn[data-mood="resting"]   { background: rgba(38,166,154,0.2); }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div id="ui">
  <div id="header">
    <div id="brand">沈光<span>DT-hourglass · 情緒沉積視覺化</span></div>
    <div id="mood-badge">平靜</div>
  </div>
</div>

<div id="center-hint">沙漏正在沉積你的情緒</div>

<div id="mood-selector">
  <button class="mood-btn active" data-mood="serene" title="平靜">☁</button>
  <button class="mood-btn" data-mood="anxious" title="焦慮">⚡</button>
  <button class="mood-btn" data-mood="focused" title="專注">◈</button>
  <button class="mood-btn" data-mood="energetic" title="活力">◉</button>
  <button class="mood-btn" data-mood="resting" title="休息">☾</button>
</div>

<div id="bottom">
  <div class="card"><div class="card-icon">🤖</div><div class="card-label">AI 晶片</div><div class="card-value live">運行中</div></div>
  <div class="card"><div class="card-icon">💗</div><div class="card-label">心率</div><div class="card-value">72 bpm</div></div>
  <div class="card"><div class="card-icon">👣</div><div class="card-label">步數</div><div class="card-value">12,345</div></div>
  <div class="card"><div class="card-icon">☀</div><div class="card-label">環境光</div><div class="card-value">舒適</div></div>
  <div class="card"><div class="card-icon">😴</div><div class="card-label">睡眠</div><div class="card-value">7h 23m</div></div>
</div>

<script>
// ── Redesigned Sand Particle System ──
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H;
let cx, cy, bulbR, neckW, neckH, totalH;

const MOOD_COLORS = {
  serene:    { r:100, g:181, b:246, label:'平靜',   glow:'rgba(100,181,246,0.6)'  },
  anxious:   { r:120, g:144, b:156, label:'焦慮',   glow:'rgba(120,144,156,0.6)' },
  focused:   { r:126, g:87,  b:194, label:'專注',   glow:'rgba(126,87,194,0.6)'  },
  energetic: { r:255, g:183, b:77,  label:'活力',   glow:'rgba(255,183,77,0.6)'  },
  resting:   { r:38,  g:166, b:154, label:'休息',   glow:'rgba(38,166,154,0.6)'  },
};
let currentMood = 'serene';
let grains = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  // Center of hourglass
  cx = W / 2;
  cy = H / 2;
  bulbR  = Math.min(W * 0.20, H * 0.28);   // bulb radius
  neckW  = bulbR * 0.13;                     // neck width
  neckH  = bulbR * 0.08;                     // neck height
  totalH = bulbR * 2.2;                      // total height
}
window.addEventListener('resize', resize);
resize();

// Returns {x,y} of hourglass outline at given height y (relative to center)
function hourglassWidth(yRel) {
  const absY = Math.abs(yRel);
  const bulbH = totalH / 2 - neckH;
  if (absY <= neckH) {
    // Neck: constant narrow width
    return neckW;
  } else {
    // Bulb: circle-ish, gets wider then narrows toward neck
    const t = (absY - neckH) / bulbH;
    // Smooth bell curve: narrow at neck, wide at equator, narrow at pole
    const bell = Math.sin(t * Math.PI);
    const maxW = bulbR;
    return neckW + (maxW - neckW) * bell * bell;
  }
}

// Check if a point is inside the hourglass
function inHourglass(x, y) {
  const yRel = y - cy;
  const absY = Math.abs(yRel);
  const bulbH = totalH / 2 - neckH;
  const hw = hourglassWidth(yRel);

  if (absY <= neckH) {
    // Neck
    return Math.abs(x - cx) <= hw;
  } else if (absY <= bulbH + neckH) {
    // Bulb region
    return Math.abs(x - cx) <= hw;
  }
  return false;
}

class SandGrain {
  constructor(staggerY) {
    this._reset(staggerY);
  }
  _reset(staggerY) {
    // Start at top of hourglass with random horizontal spread
    const topY = cy - totalH / 2 + Math.random() * totalH * 0.6;
    const spread = hourglassWidth(topY - cy) * 0.8;
    this.x = cx + (Math.random() - 0.5) * spread;
    this.y = staggerY !== undefined ? topY : cy - totalH / 2 + Math.random() * totalH * 0.05;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = 0.3 + Math.random() * 0.4;   // pixels per frame
    this.size = 1.0 + Math.random() * 1.8;  // 1-3px sand grain
    this.alpha = 0;
    this.life = 0;
    this.trail = [];  // short trail for motion blur effect
  }
  update() {
    // Gravity + slight horizontal drift
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.008; // gravity accelerates fall
    this.vx *= 0.99;  // air resistance
    this.life++;
    this.alpha = Math.min(0.9, this.life / 15);

    // Constrain to hourglass shape
    const hw = hourglassWidth(this.y - cy);
    const leftEdge = cx - hw;
    const rightEdge = cx + hw;

    if (this.x < leftEdge) { this.x = leftEdge; this.vx *= -0.4; }
    if (this.x > rightEdge) { this.x = rightEdge; this.vx *= -0.4; }

    // Slow down in neck
    if (Math.abs(this.y - cy) < neckH * 2) {
      this.vy *= 0.95;
    }

    // Trail
    this.trail.push({ x: this.x, y: this.y, alpha: this.alpha * 0.4 });
    if (this.trail.length > 5) this.trail.shift();

    // Reset when fallen to bottom
    if (this.y > cy + totalH / 2 - 5 || this.life > 800) {
      this._reset();
    }
  }
  draw() {
    const mc = MOOD_COLORS[currentMood];
    // Draw trail (motion blur)
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      const frac = i / this.trail.length;
      ctx.globalAlpha = t.alpha * frac * 0.5;
      ctx.fillStyle = `rgb(${mc.r},${mc.g},${mc.b})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, this.size * frac, 0, Math.PI * 2);
      ctx.fill();
    }
    // Main grain with glow
    ctx.globalAlpha = this.alpha;
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2.5);
    grad.addColorStop(0, mc.glow);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = this.alpha * 0.9;
    ctx.fillStyle = `rgb(${mc.r},${mc.g},${mc.b})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// Create many grains staggered across the hourglass
const NUM_GRAINS = 120;
for (let i = 0; i < NUM_GRAINS; i++) {
  grains.push(new SandGrain());
  // Stagger initial positions so they're not all at top
  grains[i].y = cy - totalH / 2 + Math.random() * totalH;
  grains[i].life = Math.floor(Math.random() * 300);
  grains[i].alpha = Math.min(0.9, grains[i].life / 15);
}

function drawHourglassOutline() {
  const mc = MOOD_COLORS[currentMood];
  ctx.save();
  ctx.strokeStyle = `rgba(${mc.r},${mc.g},${mc.b},0.12)`;
  ctx.lineWidth = 1.5;

  // Draw hourglass outline path
  ctx.beginPath();
  const steps = 80;
  // Top half: left side going down
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const yRel = -(totalH / 2) + t * (totalH / 2);
    const hw = hourglassWidth(yRel);
    const px = cx - hw, py = cy + yRel;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  // Neck right side going up
  for (let i = steps; i >= 0; i--) {
    const t = i / steps;
    const yRel = -(totalH / 2) + t * (totalH / 2);
    const hw = hourglassWidth(yRel);
    ctx.lineTo(cx + hw, cy + yRel);
  }
  ctx.closePath();
  ctx.stroke();

  // Second half: bottom bulb
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const yRel = (totalH / 2) - t * (totalH / 2);
    const hw = hourglassWidth(yRel);
    const px = cx + hw, py = cy + yRel;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  for (let i = steps; i >= 0; i--) {
    const t = i / steps;
    const yRel = (totalH / 2) - t * (totalH / 2);
    const hw = hourglassWidth(yRel);
    ctx.lineTo(cx - hw, cy + yRel);
  }
  ctx.closePath();
  ctx.stroke();

  ctx.restore();
}

function drawBottomMound() {
  const mc = MOOD_COLORS[currentMood];
  const baseY = cy + totalH / 2 - 2;
  ctx.save();
  const grad = ctx.createRadialGradient(cx, baseY, 0, cx, baseY, bulbR * 0.9);
  grad.addColorStop(0, `rgba(${mc.r},${mc.g},${mc.b},0.35)`);
  grad.addColorStop(0.5, `rgba(${mc.r},${mc.g},${mc.b},0.15)`);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(cx, baseY, bulbR * 0.85, bulbR * 0.18, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function animate() {
  ctx.clearRect(0, 0, W, H);

  // Bottom accumulated sand glow
  drawBottomMound();

  // Hourglass outline
  drawHourglassOutline();

  // Sand grains
  for (const g of grains) {
    g.update();
    g.draw();
  }

  requestAnimationFrame(animate);
}
animate();

// ── Mood switching ──
const badge = document.getElementById('mood-badge');
document.querySelectorAll('.mood-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMood = btn.dataset.mood;
    badge.textContent = MOOD_COLORS[currentMood].label;
  });
});
</script>
</body>
</html>
