<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沈光 DT-hourglass</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }

/* ── Glass hourglass background ── */
body {
  background-color: #080812;
  background-image: url('https://xtsai2000-png.github.io/DT-hourglass/assets/hourglass_glass_final.png');
  background-size: 70% auto;
  background-position: center;
  background-repeat: no-repeat;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  position: relative;
}

/* ── Dramatic spotlight from above ── */
body::before {
  content: '';
  position: fixed; top: -30%; left: 0; right: 0; height: 80%;
  background: radial-gradient(ellipse 80% 100% at 50% 0%,
    rgba(255,220,100,0.10) 0%,
    rgba(255,160,40,0.04) 40%,
    transparent 70%);
  pointer-events: none; z-index: 1;
}

/* ── Vignette ── */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 100% 100% at 50% 50%,
    transparent 40%,
    rgba(4,4,10,0.7) 100%);
  pointer-events: none; z-index: 1;
}

/* ── Canvas: sand particles ── */
#particles {
  position: fixed; inset: 0;
  z-index: 2;
  pointer-events: none;
}

/* ── UI overlay ── */
#ui {
  position: fixed; inset: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  padding: 20px;
  color: white;
}

/* ── Header ── */
#header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding-top: 8px;
}

#brand {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.9);
  text-shadow: 0 2px 20px rgba(0,0,0,0.8);
}
#brand span {
  display: block;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.5);
  margin-top: 2px;
}

#mood-badge {
  font-size: 11px;
  padding: 6px 14px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  color: rgba(255,255,255,0.8);
  letter-spacing: 0.05em;
  transition: all 0.6s ease;
}

/* ── Centered hourglass area ── */
#center {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

#center-hint {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.1em;
  text-align: center;
  margin-top: 60px;
  pointer-events: none;
}

/* ── Bottom data cards ── */
#bottom {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(16px);
  border-radius: 16px;
  padding: 12px 18px;
  min-width: 80px;
  text-align: center;
  transition: all 0.3s ease;
  cursor: default;
}
.card:hover {
  background: rgba(255,255,255,0.12);
  transform: translateY(-2px);
}
.card-icon {
  font-size: 18px;
  margin-bottom: 4px;
}
.card-label {
  font-size: 9px;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  margin-bottom: 3px;
}
.card-value {
  font-size: 16px;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  letter-spacing: 0.02em;
}
.card-value.live {
  color: #4FC3F7;
}
.card-value.live::before {
  content: '';
  display: inline-block;
  width: 6px; height: 6px;
  background: #4FC3F7;
  border-radius: 50%;
  margin-right: 5px;
  animation: pulse 2s infinite;
  vertical-align: middle;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ── Mood selector ── */
#mood-selector {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex;
  gap: 8px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  border-radius: 30px;
  padding: 8px 14px;
}

.mood-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.6);
  background: transparent;
  transition: all 0.3s ease;
  display: flex; align-items: center; justify-content: center;
}
.mood-btn:hover { color: white; background: rgba(255,255,255,0.1); }
.mood-btn.active {
  border-color: rgba(255,255,255,0.6);
  color: white;
  background: rgba(255,255,255,0.15);
  transform: scale(1.15);
}

.mood-btn[data-mood="serene"]   { background: rgba(100,181,246,0.2); }
.mood-btn[data-mood="anxious"]  { background: rgba(120,144,156,0.2); }
.mood-btn[data-mood="focused"]  { background: rgba(126,87,194,0.2); }
.mood-btn[data-mood="energetic"]{ background: rgba(255,183,77,0.2); }
.mood-btn[data-mood="resting"]  { background: rgba(38,166,154,0.2); }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div id="ui">
  <div id="header">
    <div id="brand">
      沈光
      <span>DT-hourglass · 情緒沉積視覺化</span>
    </div>
    <div id="mood-badge">平靜</div>
  </div>

  <div id="center">
    <div id="center-hint">沙漏正在沉積你的情緒</div>
  </div>

  <div id="mood-selector">
    <button class="mood-btn active" data-mood="serene" title="平靜">☁</button>
    <button class="mood-btn" data-mood="anxious" title="焦慮">⚡</button>
    <button class="mood-btn" data-mood="focused" title="專注">◈</button>
    <button class="mood-btn" data-mood="energetic" title="活力">◉</button>
    <button class="mood-btn" data-mood="resting" title="休息">☾</button>
  </div>

  <div id="bottom">
    <div class="card">
      <div class="card-icon">🤖</div>
      <div class="card-label">AI 晶片</div>
      <div class="card-value live">運行中</div>
    </div>
    <div class="card">
      <div class="card-icon">💗</div>
      <div class="card-label">心率</div>
      <div class="card-value">72 bpm</div>
    </div>
    <div class="card">
      <div class="card-icon">👣</div>
      <div class="card-label">步數</div>
      <div class="card-value">12,345</div>
    </div>
    <div class="card">
      <div class="card-icon">☀</div>
      <div class="card-label">環境光</div>
      <div class="card-value">舒適</div>
    </div>
    <div class="card">
      <div class="card-icon">😴</div>
      <div class="card-label">睡眠</div>
      <div class="card-value">7h 23m</div>
    </div>
  </div>
</div>

<script>
// ── Sand Particle System ──
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H;

const MOOD_COLORS = {
  serene:    { r: 100, g: 181, b: 246, label: '平靜',   texture: 0.2 },
  anxious:   { r: 120, g: 144, b: 156, label: '焦慮',   texture: 0.8 },
  focused:   { r: 126, g: 87,  b: 194, label: '專注',   texture: 0.9 },
  energetic: { r: 255, g: 183, b: 77,  label: '活力',   texture: 0.5 },
  resting:   { r: 38,  g: 166, b: 154, label: '休息',   texture: 0.3 },
};

let currentMood = 'serene';
let particles = [];
const MAX_PARTICLES = 180;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Hourglass outline (in relative coords 0-1)
function getHourglassBounds() {
  const cx = 0.5, cy = 0.5;
  const hw = 0.14, hh = 0.38; // half-width, half-height
  return { cx, cy, hw, hh };
}

function isInsideHourglass(x, y) {
  // Top bulb: ellipse centered at (cx, cy - hh*0.28), radii (hw, hh*0.3)
  // Bottom bulb: ellipse centered at (cx, cy + hh*0.28), radii (hw, hh*0.3)
  // Neck: rectangle at center, width = hw*0.22, height = hh*0.1
  const { cx, cy, hw, hh } = getHourglassBounds();
  const nx = (x - cx) / hw;
  const ny = (y - cy) / hh;

  // Top bulb
  const nt = ny + 0.28;
  const nb = ny - 0.28;
  const tBulb = (nx*nx) / 1 + (nt*nt) / 0.09 < 1 && ny < 0;
  const bBulb = (nx*nx) / 1 + (nb*nb) / 0.09 < 1 && ny > 0;
  const neck = Math.abs(nx) < 0.11 && Math.abs(ny) < 0.055;

  return tBulb || bBulb || neck;
}

class Particle {
  constructor() { this.reset(); }
  reset() {
    const { cx, cy, hw, hh } = getHourglassBounds();
    // Start at top bulb center area
    this.x = cx + (Math.random() - 0.5) * hw * 0.7;
    this.y = cy - hh * 0.2;
    this.vx = (Math.random() - 0.5) * 0.0008;
    this.vy = 0.002 + Math.random() * 0.003;
    this.size = 2 + Math.random() * 3;
    const c = MOOD_COLORS[currentMood];
    this.color = `rgba(${c.r},${c.g},${c.b},${0.4 + Math.random() * 0.5})`;
    this.alpha = 0;
    this.life = 0;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life++;
    this.alpha = Math.min(1, this.life / 20);
    // Gravity pulls toward center as it falls
    const { cx } = getHourglassBounds();
    this.vx += (cx - this.x) * 0.00005;
    // Remove if out of hourglass bottom
    if (this.y > 0.65 || !isInsideHourglass(this.x, this.y)) {
      this.reset();
    }
  }
  draw() {
    const sx = this.x * W, sy = this.y * H;
    ctx.save();
    ctx.globalAlpha = this.alpha * 0.85;
    // Glow
    const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, this.size * 2.5);
    grad.addColorStop(0, this.color);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(sx, sy, this.size * 2.5, 0, Math.PI * 2);
    ctx.fill();
    // Core dot
    ctx.globalAlpha = this.alpha;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(sx, sy, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// Init particles
for (let i = 0; i < MAX_PARTICLES; i++) {
  const p = new Particle();
  p.y = 0.0 + Math.random() * 0.95; // stagger initial positions
  p.life = Math.floor(Math.random() * 100);
  p.alpha = Math.min(1, p.life / 20);
  particles.push(p);
}

function animate() {
  ctx.clearRect(0, 0, W, H);
  for (const p of particles) {
    p.update();
    p.draw();
  }
  requestAnimationFrame(animate);
}
animate();

// ── Mood switching ──
const badge = document.getElementById('mood-badge');
document.querySelectorAll('.mood-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMood = btn.dataset.mood;
    badge.textContent = MOOD_COLORS[currentMood].label;
    badge.style.borderColor = `rgba(${MOOD_COLORS[currentMood].r},${MOOD_COLORS[currentMood].g},${MOOD_COLORS[currentMood].b},0.4)`;
    badge.style.color = `rgba(255,255,255,0.9)`;
  });
});
</script>
</body>
</html>
