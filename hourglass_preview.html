<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沈光 DT-hourglass</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  background-color: #080812;
  background-image: url('https://xtsai2000-png.github.io/DT-hourglass/assets/hourglass_glass_final.png');
  background-size: 70% auto;
  background-position: center;
  background-repeat: no-repeat;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  position: relative;
}

/* Dramatic spotlight from above */
body::before {
  content: '';
  position: fixed; top: -30%; left: 0; right: 0; height: 80%;
  background: radial-gradient(ellipse 80% 100% at 50% 0%,
    rgba(255,220,100,0.08) 0%,
    rgba(255,180,60,0.04) 30%,
    transparent 70%);
  pointer-events: none; z-index: 1;
}

/* Bottom ambient glow */
body::after {
  content: '';
  position: fixed; bottom: 0; left: 0; right: 0; height: 50%;
  background: radial-gradient(ellipse 60% 80% at 50% 100%,
    rgba(255,200,80,0.05) 0%,
    transparent 70%);
  pointer-events: none; z-index: 1;
}

/* ── CSS Glass Bulb (top) ── */
.bulb-top {
  position: fixed;
  top: calc(50% - 200px);
  left: 50%;
  transform: translateX(-50%);
  width: 260px; height: 220px;
  border-radius: 50%;
  background: radial-gradient(ellipse at 40% 35%,
    rgba(255,255,255,0.12) 0%,
    rgba(255,220,100,0.06) 30%,
    rgba(255,200,80,0.03) 60%,
    rgba(0,0,0,0.15) 100%);
  border: 1px solid rgba(255,220,100,0.30);
  box-shadow:
    inset 0 -30px 60px rgba(255,200,80,0.08),
    inset 0 10px 40px rgba(255,255,255,0.05),
    0 0 20px rgba(255,200,80,0.05);
  z-index: 2;
}

/* ── CSS Glass Bulb (bottom) ── */
.bulb-bot {
  position: fixed;
  top: calc(50% + 20px);
  left: 50%;
  transform: translateX(-50%);
  width: 270px; height: 230px;
  border-radius: 50%;
  background: radial-gradient(ellipse at 50% 40%,
    rgba(255,200,80,0.10) 0%,
    rgba(255,160,40,0.06) 40%,
    rgba(0,0,0,0.20) 100%);
  border: 1px solid rgba(255,220,100,0.25);
  box-shadow:
    inset 0 20px 50px rgba(255,180,60,0.06),
    inset 0 -10px 30px rgba(0,0,0,0.20),
    0 0 20px rgba(255,200,80,0.04);
  z-index: 2;
}

/* ── Neck ── */
.neck {
  position: fixed;
  top: calc(50% - 20px);
  left: 50%;
  transform: translateX(-50%);
  width: 22px; height: 60px;
  background: linear-gradient(to bottom,
    rgba(255,210,80,0.12) 0%,
    rgba(255,180,60,0.08) 50%,
    rgba(255,200,80,0.10) 100%);
  border-left: 1px solid rgba(255,220,100,0.25);
  border-right: 1px solid rgba(255,220,100,0.25);
  z-index: 2;
}

/* ── Stream glow ── */
.stream {
  position: fixed;
  top: calc(50% - 175px);
  left: 50%;
  transform: translateX(-50%);
  width: 3px; height: 60px;
  background: linear-gradient(to bottom,
    rgba(255,220,80,0.95) 0%,
    rgba(255,200,60,0.7) 60%,
    rgba(255,180,40,0.3) 100%);
  border-radius: 2px;
  box-shadow:
    0 0 6px rgba(255,215,0,0.8),
    0 0 12px rgba(255,215,0,0.4),
    0 0 24px rgba(255,200,80,0.2);
  z-index: 3;
  animation: stream-pulse 0.7s ease-in-out infinite;
}

@keyframes stream-pulse {
  0%, 100% { opacity: 0.85; width: 3px; }
  50%       { opacity: 1;   width: 4px; }
}

/* ── Falling particle dots ── */
@keyframes fall-d1 {
  0%   { transform: translateY(0px) translateX(0px); opacity: 0; }
  8%   { opacity: 1; }
  88%  { opacity: 0.8; }
  100% { transform: translateY(60px) translateX(8px); opacity: 0; }
}
@keyframes fall-d2 {
  0%   { transform: translateY(0px) translateX(0px); opacity: 0; }
  8%   { opacity: 0.9; }
  88%  { opacity: 0.6; }
  100% { transform: translateY(60px) translateX(-6px); opacity: 0; }
}
@keyframes fall-d3 {
  0%   { transform: translateY(0px) translateX(0px); opacity: 0; }
  8%   { opacity: 1; }
  88%  { opacity: 0.7; }
  100% { transform: translateY(60px) translateX(4px); opacity: 0; }
}

.pdot {
  position: fixed;
  top: calc(50% - 175px);
  border-radius: 50%;
  box-shadow: 0 0 4px currentColor, 0 0 8px currentColor;
  z-index: 3;
}
.p1 { left: calc(50% + 2px);  width: 2.5px; height: 2.5px; background: #fde047; animation: fall-d1 1.8s ease-in infinite 0s;    }
.p2 { left: calc(50% - 4px);  width: 2px;   height: 2px;   background: #fbbf24; animation: fall-d2 2.1s ease-in infinite 0.3s;  }
.p3 { left: calc(50% + 5px);  width: 2px;   height: 2px;   background: #fde047; animation: fall-d3 1.6s ease-in infinite 0.6s;  }
.p4 { left: calc(50% - 2px);  width: 3px;   height: 3px;   background: #22d3ee; animation: fall-d1 2.0s ease-in infinite 0.9s;  }
.p5 { left: calc(50% + 3px);  width: 2px;   height: 2px;   background: #fde047; animation: fall-d2 1.9s ease-in infinite 1.2s;  }
.p6 { left: calc(50% - 5px);  width: 2px;   height: 2px;   background: #fbbf24; animation: fall-d3 2.2s ease-in infinite 0.15s; }
.p7 { left: calc(50% + 1px);  width: 2.5px; height: 2.5px; background: #fde047; animation: fall-d1 1.7s ease-in infinite 0.45s; }
.p8 { left: calc(50% - 3px);  width: 2px;   height: 2px;   background: #22d3ee; animation: fall-d2 2.3s ease-in infinite 0.75s; }

/* ── Mound (bottom sand pile) ── */
.mound {
  position: fixed;
  bottom: calc(50% - 230px);
  left: 50%;
  transform: translateX(-50%);
  width: 130px; height: 35px;
  background: radial-gradient(ellipse at 50% 100%,
    rgba(255,215,0,0.80) 0%,
    rgba(245,158,11,0.50) 40%,
    rgba(180,83,9,0.20) 70%,
    transparent 100%);
  border-radius: 50%;
  box-shadow:
    0 0 20px rgba(255,200,0,0.3),
    0 0 40px rgba(255,180,0,0.15);
  z-index: 2;
  animation: mound-pulse 2s ease-in-out infinite;
}

@keyframes mound-pulse {
  0%, 100% { opacity: 0.75; transform: translateX(-50%) scaleX(1); }
  50%       { opacity: 0.95; transform: translateX(-50%) scaleX(1.06); }
}

/* ── Ambient rings ── */
.ring {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  border: 1px solid rgba(255,200,80,0.05);
  pointer-events: none;
  z-index: 1;
}
.r1 { width: 380px; height: 560px; animation: ring-breathe 4s ease-in-out infinite 0s; }
.r2 { width: 440px; height: 620px; animation: ring-breathe 4s ease-in-out infinite 1s; }
.r3 { width: 500px; height: 680px; animation: ring-breathe 4s ease-in-out infinite 2s; }

@keyframes ring-breathe {
  0%, 100% { opacity: 0.4; transform: translate(-50%,-50%) scale(1); }
  50%       { opacity: 0.15; transform: translate(-50%,-50%) scale(1.03); }
}

/* ── UI Cards ── */
.data-cards { position: fixed; top: 60px; left: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
.card {
  background: rgba(10,10,22,0.82);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 16px; padding: 11px 16px;
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  display: flex; align-items: center; gap: 12px;
  animation: card-float 4s ease-in-out infinite;
}
.card:nth-child(2) { animation-delay: 0.5s; }
.card:nth-child(3) { animation-delay: 1.0s; }
.card:nth-child(4) { animation-delay: 1.5s; }

@keyframes card-float {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-5px); }
}
.card-label { font-size: 10px; color: rgba(255,255,255,0.42); text-transform: uppercase; letter-spacing: 0.06em; }
.card-value { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: 0.02em; }

/* Sleep */
.sleep-card {
  position: fixed; top: 60px; right: 20px;
  background: rgba(10,10,22,0.82); border: 1px solid rgba(255,255,255,0.09);
  border-radius: 16px; padding: 12px 16px;
  backdrop-filter: blur(16px); z-index: 10;
  animation: card-float 5s ease-in-out infinite 2s;
}
.sleep-title { font-size: 10px; color: rgba(255,255,255,0.42); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.sleep-bars { display: flex; align-items: flex-end; gap: 3px; height: 34px; }
.sleep-bar { width: 9px; border-radius: 3px; background: linear-gradient(to top, #6366f1, #8b5cf6); }

/* Emotion */
.emotion-area { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 10; }
.emotion-label { font-size: 13px; color: rgba(255,255,255,0.58); margin-bottom: 10px; }
.emotion-label strong { color: #f97316; font-weight: 700; }
.emotion-buttons {
  display: flex; gap: 6px;
  background: rgba(10,10,22,0.82); border: 1px solid rgba(255,255,255,0.09);
  border-radius: 50px; padding: 5px 10px;
  backdrop-filter: blur(16px);
}
.emotion-btn {
  padding: 5px 13px; border-radius: 50px; border: none;
  font-size: 11px; cursor: pointer; transition: all 0.2s;
  color: rgba(255,255,255,0.48); background: transparent;
}
.emotion-btn.active { color: #fff; font-weight: 700; }
.emotion-btn.calm.active { background: #3b82f6; }
.emotion-btn.focused.active { background: #8b5cf6; }
.emotion-btn.anxious.active { background: #92400e; }
.emotion-btn.vitality.active { background: #f97316; }
.emotion-btn.rest.active { background: #0d9488; }

/* Nav */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 60px; background: rgba(8,8,18,0.95);
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: center;
  gap: 40px; z-index: 10;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.nav-btn.back { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.38); }
.nav-btn.ai {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: #fff; font-size: 16px; width: 50px; height: 50px;
  box-shadow: 0 0 24px rgba(99,102,241,0.55);
}
.nav-btn.settings { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.38); }
@keyframes dot-pulse {
  0%, 100% { opacity: 0.5; transform: scale(1); }
  50%       { opacity: 1;   transform: scale(1.25); }
}
.ai-dot { display: inline-block; width: 6px; height: 6px; background: #a5b4fc; border-radius: 50%; animation: dot-pulse 1.5s ease-in-out infinite; }
</style>
</head>
<body>

<!-- Ambient rings -->
<div class="ring r1"></div>
<div class="ring r2"></div>
<div class="ring r3"></div>

<!-- CSS Glass Hourglass -->
<div class="bulb-top"></div>
<div class="bulb-bot"></div>
<div class="neck"></div>
<div class="mound"></div>
<div class="stream"></div>
<div class="pdot p1"></div>
<div class="pdot p2"></div>
<div class="pdot p3"></div>
<div class="pdot p4"></div>
<div class="pdot p5"></div>
<div class="pdot p6"></div>
<div class="pdot p7"></div>
<div class="pdot p8"></div>

<!-- Data Cards -->
<div class="data-cards">
  <div class="card">
    <span style="font-size:18px">🤖</span>
    <div><div class="card-label">AI Chip</div><div class="card-value">Running</div></div>
  </div>
  <div class="card">
    <span style="font-size:18px">💗</span>
    <div><div class="card-label">Heart Rate</div><div class="card-value">72 bpm</div></div>
  </div>
  <div class="card">
    <span style="font-size:18px">👟</span>
    <div><div class="card-label">Steps</div><div class="card-value">12,345</div></div>
  </div>
  <div class="card">
    <span style="font-size:18px">☀️</span>
    <div><div class="card-label">Light</div><div class="card-value">350 lux</div></div>
  </div>
</div>

<!-- Sleep -->
<div class="sleep-card">
  <div class="sleep-title">💤 Sleep Monitor</div>
  <div class="sleep-bars">
    <div class="sleep-bar" style="height:13px"></div>
    <div class="sleep-bar" style="height:19px"></div>
    <div class="sleep-bar" style="height:27px"></div>
    <div class="sleep-bar" style="height:34px"></div>
    <div class="sleep-bar" style="height:21px"></div>
    <div class="sleep-bar" style="height:17px"></div>
    <div class="sleep-bar" style="height:9px"></div>
  </div>
</div>

<!-- Emotion -->
<div class="emotion-area">
  <div class="emotion-label">Current Emotion: <strong>Vitality</strong></div>
  <div class="emotion-buttons">
    <button class="emotion-btn calm">Calm</button>
    <button class="emotion-btn focused">Focus</button>
    <button class="emotion-btn anxious">Anxious</button>
    <button class="emotion-btn vitality active">Vitality</button>
    <button class="emotion-btn rest">Rest</button>
  </div>
</div>

<!-- Nav -->
<div class="bottom-nav">
  <button class="nav-btn back">←</button>
  <button class="nav-btn ai">✨ AI <span class="ai-dot"></span></button>
  <button class="nav-btn settings">⚙</button>
</div>

</body>
</html>
