name: dt_hourglass
description: "沉光 — 數位化時光沙漏，讓時間的重量與智慧可視化"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # 狀態管理
  flutter_riverpod: ^2.6.1

  # 本地儲存（MVP）
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 工具
  cupertino_icons: ^1.0.8
  uuid: ^4.5.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - docs/assets/
